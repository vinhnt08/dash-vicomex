<div class="px-scale-24 py-scale-16 border-b border-outline-variant flex justify-between items-center bg-surface-container-lowest sticky top-0 z-10">
<h2 class="font-title-md text-title-md text-on-surface">Duyệt Lệnh Cắt Mooc &amp; Lưu Hub - #112233</h2>
<button aria-label="Đóng" class="text-on-surface-variant hover:text-primary transition-colors focus:outline-none rounded-full p-1 hover:bg-surface-container-low">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="p-scale-24 flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-scale-24 bg-surface-container-lowest">
<!-- Reason Block -->
<div class="bg-surface-container-low rounded-lg p-scale-16 border border-outline-variant flex gap-scale-12 items-start">
<span class="material-symbols-outlined text-secondary mt-0.5">info</span>
<div>

</div>
</div>

<div class="flex flex-col gap-scale-12">

<label class="relative block cursor-pointer group">
<input checked="" class="peer sr-only" name="hub_selection" type="radio" value="hub1"/>
<div class="rounded-lg border-2 border-primary bg-surface-container-lowest p-scale-16 transition-all peer-checked:bg-secondary-container/20 group-hover:bg-surface-container-low">
<div class="flex justify-between items-start mb-scale-8">
<div class="flex items-center gap-scale-8">
<div class="w-4 h-4 rounded-full border-2 border-primary flex items-center justify-center relative">
<div class="w-2 h-2 rounded-full bg-primary absolute"></div>
</div>
<span class="font-title-md text-title-md text-on-surface">Hub KCN Lớn</span>
</div>
<span class="bg-[#e8f5e9] text-[#2e7d32] font-label-caps text-label-caps px-2 py-0.5 rounded-full border border-[#c8e6c9]">Tối ưu</span>
</div>
<div class="pl-scale-24 flex flex-col gap-scale-4 mt-scale-8">
<div class="flex justify-between items-center text-body-sm font-body-sm">
<span class="text-on-surface-variant flex items-center gap-2"><span class="material-symbols-outlined text-[16px]">warehouse</span> Sức chứa:</span>

</div>
<div class="flex justify-between items-center text-body-sm font-body-sm">

<span class="text-on-surface font-medium">Sẵn sàng 4/4</span>
</div>
</div>
</div>
</label>

<div class="flex justify-between items-start mb-scale-8">
<div class="flex items-center gap-scale-8">
<div class="w-4 h-4 rounded-full border border-outline flex items-center justify-center relative peer-checked:border-primary">

<option disabled="" hidden="" selected="" value="">Chọn đầu kéo đang rảnh tại Hub...</option>
<option value="tk1">Đầu kéo 51C-123.45 (Tài xế B)</option>
