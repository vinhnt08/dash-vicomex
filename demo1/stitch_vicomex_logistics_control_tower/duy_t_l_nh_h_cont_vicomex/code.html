<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;

            white-space: nowrap;

<body class="bg-surface-container-high text-on-surface font-body-md min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-gutter">
<!-- Modal Container -->
<div class="bg-surface rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] w-full max-w-2xl flex flex-col border border-outline-variant max-h-[921px] overflow-hidden">
<!-- 1. Header -->
<div class="flex items-center justify-between px-scale-24 py-scale-16 border-b border-outline-variant bg-surface-container-lowest">
<h2 class="font-title-md text-title-md text-on-surface">Duyệt Lệnh Hạ Cont - #778899</h2>
<button class="text-on-surface-variant hover:text-on-surface transition-colors rounded-full p-1 hover:bg-surface-container">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto p-scale-24 flex flex-col gap-scale-24">
<!-- 2. Reason Section -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-scale-16 flex gap-scale-12 items-start">
<span class="material-symbols-outlined text-secondary" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<p class="font-label-md text-label-md text-on-surface">Lý do:</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Đóng cont sớm chưa đến giờ nộp cảng</p>
</div>
</div>
<!-- 3. Hub Selection -->
<div>
<h3 class="font-label-md text-label-md text-on-surface mb-scale-12">Chọn Hub Hạ Cont</h3>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-scale-16">
<!-- Option 1: Hub KCN Lớn -->
<label class="relative flex cursor-pointer rounded-lg border border-primary bg-surface-container-lowest p-scale-16 shadow-sm focus:outline-none ring-2 ring-primary/10">
<input checked="" class="sr-only" name="hub_selection" type="radio" value="hub_kcn_lon"/>
<div class="flex flex-1 flex-col">
<div class="flex items-center justify-between mb-scale-8">
<span class="font-title-md text-title-md text-on-surface">Hub KCN Lớn</span>
<span class="inline-flex items-center rounded-full bg-secondary-container px-2 py-1 font-label-caps text-label-caps text-on-secondary-container">Tối ưu</span>
</div>
<div class="space-y-1">
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="inventory_2">inventory_2</span>
                                        Sức chứa: Trống 20 slot
                                    </p>
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="local_shipping">local_shipping</span>
                                        Xe chuyên dụng: Sẵn sàng 4/4
                                    </p>
</div>
</div>
<span aria-hidden="true" class="pointer-events-none absolute -inset-px rounded-lg border-2 border-primary"></span>
</label>
<!-- Option 2: Hub KCN 2 -->
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant bg-surface-container-lowest p-scale-16 shadow-sm hover:bg-surface-container transition-colors focus:outline-none">
<input class="sr-only" name="hub_selection" type="radio" value="hub_kcn_2"/>
<div class="flex flex-1 flex-col">
<div class="flex items-center justify-between mb-scale-8">
<span class="font-title-md text-title-md text-on-surface">Hub KCN 2</span>
<span class="inline-flex items-center rounded-full bg-error-container px-2 py-1 font-label-caps text-label-caps text-on-error-container">Cảnh báo quá tải</span>
</div>
<div class="space-y-1">
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="inventory_2">inventory_2</span>
                                        Sức chứa: Trống 5 slot
                                    </p>
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="local_shipping">local_shipping</span>
                                        Xe chuyên dụng: Bận 1/1
                                    </p>
</div>
</div>
</label>
</div>
</div>
<!-- 4. Cost Calculation Box -->
<div class="bg-tertiary-fixed rounded-lg border border-tertiary-fixed-dim p-scale-16 flex flex-col gap-scale-12">
<div class="flex items-center gap-2 text-on-tertiary-fixed">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<h3 class="font-title-md text-title-md">Dự toán Phí Hạ &amp; Lưu Bãi (Hub Thuê Ngoài)</h3>
</div>
<div class="space-y-scale-8 text-on-tertiary-fixed-variant">
<div class="flex justify-between font-body-sm text-body-sm">
<span>Phí hạ cont:</span>
<span class="font-label-md text-label-md">150,000 VNĐ</span>
</div>
<div class="flex justify-between font-body-sm text-body-sm">
<span>Phí lưu cont dự kiến (2 ngày):</span>
<span class="font-label-md text-label-md">200,000 VNĐ <span class="text-on-tertiary-container opacity-80">(100k/ngày)</span></span>
</div>
</div>
<hr class="border-tertiary-fixed-dim border-t-1 my-1"/>
<div class="flex justify-between items-center text-on-tertiary-fixed">
<span class="font-label-md text-label-md">Tổng cộng:</span>
<span class="font-title-md text-title-md font-bold">350,000 VNĐ</span>
</div>
</div>
</div>
<!-- 5. Footer -->
<div class="border-t border-outline-variant bg-surface-container-lowest p-scale-16 flex flex-col sm:flex-row items-center justify-end gap-scale-12">
<button class="w-full sm:w-auto h-10 px-scale-16 rounded border border-outline text-on-surface font-label-md text-label-md hover:bg-surface-container transition-colors flex items-center justify-center">
                    Từ chối
                </button>
<button class="w-full sm:w-auto h-10 px-scale-16 rounded bg-surface border border-outline-variant text-on-surface font-label-md text-label-md hover:bg-surface-container-high transition-colors shadow-sm flex items-center justify-center">
                    Đổi Hub khác
                </button>
<button class="w-full sm:w-auto h-10 px-scale-16 rounded bg-primary text-on-primary font-label-md text-label-md hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
                    Xác nhận Hạ Cont &amp; Ghi nhận Phí
                </button>
</div>
</div>
</div>
